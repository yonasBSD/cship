# Sample Starship configuration showing cship integration.
#
# This is an example of a full Starship config that uses cship as a native
# module. Copy relevant sections into your own ~/.config/starship.toml.
#
# For cship-specific configuration options, see the [cship] sections below.
# colors from https://www.color-hex.com/
format = """
[](#3d414a)\
$os\
$username\
[](bg:#5f6366 fg:#3d414a)\
$directory\
[](fg:#5f6366 bg:#4e6e97)\
$git_branch\
$git_status\
[](fg:#4e6e97 bg:#86BBD8)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$python\
$rust\
$scala\
[](fg:#86BBD8 bg:#4d7dc5)\
$docker_context\
[](fg:#4d7dc5 bg:#ffc878)\
$cmd_duration\
[ ](fg:#ffc878)\
$fill\
$time\
$line_break\
$character\
"""

add_newline = true

[fill]
symbol = ". "

[character]
success_symbol = ' [󱞩](bold green) '
error_symbol = ' [󱞩](bold red) '

[username]
disabled = true

[os]
style = "bg:#3d414a"
disabled = false

[os.symbols]
Macos = " "
Ubuntu = " "
Windows = "󰍲 "

[directory]
style = "bg:#5f6366"
format = "[ $path ]($style)"
truncation_length = 2
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"Projects" = " "
"Developer" = "󰣪 "

[docker_context]
symbol = " "
style = "bg:#4d7dc5"
format = '[ $symbol $context ]($style)'

[git_branch]
symbol = ""
style = "bg:#4e6e97"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#4e6e97"
format = '[$all_status$ahead_behind ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
format = '🕙 $time'

[golang]
symbol = '🐹'
style = "bg:#86BBD8"
format = '[ via $symbol ($version) ]($style)'

[nodejs]
symbol = '󰎙'
style = "bg:#86BBD8"
format = '[ via [$symbol](#00FF00 $style) ($version) ]($style)'

[python]
symbol = ''
style = "bg:#86BBD8"
format = '[ $symbol ($version) \($virtualenv\) ]($style)'

[rust]
symbol = '🦀'
style = "bg:#86BBD8"
format = '[ $symbol ($version) ]($style)'

[cmd_duration]
min_time = 1
style = "bg:#ffc878"
format = '[  $duration]($style)'
show_milliseconds = true

[cship]
lines = [
  """$git_branch $cship.model.display_name $cship.context_bar $cship.cost $cship.usage_limits""",
]

[cship.model]
symbol = " "
style = "fg:#c792ea"
format = "[$symbol$value]($style)"

[cship.context_bar]
symbol = " "
width = 5
style = "fg:#c3e88d"
format = "[$symbol$value]($style)"
warn_threshold = 50.0
warn_style = "fg:#ffcb6b"
critical_threshold = 70.0
critical_style = "bold fg:#ff5370"

[cship.cost]
symbol = " "
style = "fg:#c3e88d"
format = "[$symbol$value]($style)"
warn_threshold = 0.30
warn_style = "fg:#ffcb6b"
critical_threshold = 0.35
critical_style = "bold fg:#ff5370"

# Output: 5h: XX% resets in Xh Xm | 7d: XX% resets in Xd Xh
[cship.usage_limits]
symbol = "󰔟 "
style = "fg:#c3e88d"
format = "[$symbol$value]($style)"
warn_threshold = 50.0
warn_style = "fg:#ffcb6b"
critical_threshold = 70.0
critical_style = "bold fg:#ff5370"
